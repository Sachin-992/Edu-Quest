name: Database Backup

on:
  schedule:
    # Weekly backup every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    name: 📦 Supabase Database Backup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backup_${TIMESTAMP}.sql"
          
          echo "📦 Creating backup: $FILENAME"
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            --format=custom \
            --file="$FILENAME.dump"
          
          echo "✅ Backup created: $(du -h $FILENAME.dump | cut -f1)"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: '*.dump'
          retention-days: 30

      - name: Cleanup old audit logs
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -c "SELECT public.cleanup_old_audit_logs();"
          echo "🧹 Old audit logs cleaned up"

  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: backup
    if: failure()
    steps:
      - name: Backup failed notification
        run: |
          echo "⚠️ Database backup failed!" >> $GITHUB_STEP_SUMMARY
          echo "Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
